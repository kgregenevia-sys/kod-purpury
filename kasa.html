<!doctype html><html lang="pl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KASA · KOD PURPURY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090c;color:#d8e0e8;font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;padding:18px;max-width:1100px;margin:0 auto}
a.back{color:#5a6b7a;text-decoration:none;font-size:12px}
h1{font-size:19px;letter-spacing:.14em;margin:12px 0 3px;color:#eaf2f8}
.sub{color:#5a6b7a;font-size:11px;margin-bottom:20px}
.money{background:linear-gradient(180deg,#0d1b14,#0a0f0c);border:1px solid #12452e;border-radius:11px;padding:20px;margin-bottom:16px}
.big{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.big .v{font-size:44px;font-weight:700;color:#00e07a;letter-spacing:-.02em}
.big .l{font-size:11px;letter-spacing:.16em;color:#4e7a63}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:9px}
.k{background:#0b1116;border:1px solid #182029;border-radius:8px;padding:11px}
.k .l{font-size:10px;letter-spacing:.1em;color:#5a6b7a;margin-bottom:5px}
.k .v{font-size:21px;font-weight:700;color:#eaf2f8}
.k.zero .v{color:#3d4a56}
.k.warn{border-color:#4a2a12}.k.warn .v{color:#ff9d3d}
h2{font-size:11px;letter-spacing:.16em;color:#5a6b7a;margin:22px 0 9px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:#5a6b7a;font-weight:600;font-size:10px;letter-spacing:.1em;padding:7px 9px;border-bottom:1px solid #182029}
td{padding:8px 9px;border-bottom:1px solid #10161c}
td.n{text-align:right;font-variant-numeric:tabular-nums}
.ok{color:#00e07a}.bad{color:#ff5d5d}.dim{color:#4a5865}
.line{background:#0b1116;border:1px solid #182029;border-radius:9px;padding:13px;margin-bottom:9px}
.line h3{font-size:12px;color:#c8d4e0;margin-bottom:7px;letter-spacing:.05em}
.line .st{font-size:11px;color:#5a6b7a}
.chips{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;font-size:11px;color:#7d8b99}
.chips b{color:#eaf2f8;font-size:13px}
.truth{background:#170d0d;border:1px solid #4a1f1f;border-radius:9px;padding:13px;margin-top:20px;font-size:12px;color:#ffb3b3}
.truth b{color:#ff6b6b}
#err{color:#ff5d5d;padding:12px}
</style></head><body>
<a class="back" href="dowodzenie.html">‹ Panel</a>
<h1>💰 KASA</h1>
<div class="sub" id="ts">ładowanie…</div>
<div id="app"></div>
<script>
const f=n=>Number(n||0).toLocaleString('pl-PL');
fetch('kasa.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  const g=d.gora,p=d.prawda;
  document.getElementById('ts').textContent='aktualizacja: '+new Date(d.updated_at).toLocaleString('pl-PL')+' · odświeża się co 10 min';
  const kafel=(l,v,cls='')=>`<div class="k ${cls||(Number(v)?'':'zero')}"><div class="l">${l}</div><div class="v">${typeof v==='number'?f(v):v}</div></div>`;
  let h=`<div class="money">
    <div class="big"><span class="l">PRZYCHÓD DZISIAJ</span><span class="v">${f(g.przychod_dzis_pln)} PLN</span></div>
    <div class="grid">
      ${kafel('PIPELINE PLN',g.pipeline_pln)}
      ${kafel('PRZYCHÓD 30D',g.przychod_30d_pln)}
      ${kafel('NOWE LEADY 24H',g.nowe_leady_24h)}
      ${kafel('ZWERYFIKOWANE',g.zweryfikowane)}
      ${kafel('KONTAKTY 24H',g.kontakty_24h)}
      ${kafel('ODPOWIEDZI (DOWÓD)',g.odpowiedzi_zweryfikowane)}
      ${kafel('SPOTKANIA',g.spotkania)}
      ${kafel('OFERTY',g.oferty_wyslane)}
      ${kafel('TRANSAKCJE',g.transakcje)}
    </div></div>`;

  h+='<h2>TRZY MASZYNY ZARABIANIA</h2>';
  d.money_lines.forEach(m=>{
    const ch=Object.entries(m).filter(([k])=>!['nazwa','produkt','status'].includes(k))
      .map(([k,v])=>`<span>${k.replace(/_/g,' ')} <b>${typeof v==='number'?f(v):v}</b></span>`).join('');
    h+=`<div class="line"><h3>${m.nazwa} — ${m.produkt}</h3><div class="chips">${ch}</div><div class="st">${m.status}</div></div>`;
  });

  h+='<h2>AGENCI — ROZLICZANI Z DOWODÓW</h2><table><tr><th>AGENT</th><th class="n">ACTIONS</th><th class="n">RESULTS</th><th class="n">ODRZUCONE</th><th class="n">REVENUE</th></tr>';
  (d.agenci||[]).forEach(a=>{
    h+=`<tr><td>${a.agent}</td><td class="n">${a.actions}</td>
      <td class="n ${a.results?'ok':'bad'}">${a.results}</td>
      <td class="n dim">${a.odrzucone}</td><td class="n dim">${f(a.revenue)} PLN</td></tr>`;
  });
  h+='</table>';

  if(d.warianty_oferty&&d.warianty_oferty.length){
    h+='<h2>OFFER LAB — TEST TREŚCI</h2><table><tr><th>WARIANT</th><th class="n">WYSŁANE</th><th class="n">ODPOWIEDZI</th><th class="n">POZYTYWNE</th></tr>';
    d.warianty_oferty.forEach(v=>{h+=`<tr><td>${v.code}</td><td class="n">${v.wyslane}</td><td class="n">${v.odpowiedzi}</td><td class="n ${v.pozytywne?'ok':''}">${v.pozytywne}</td></tr>`;});
    h+='</table>';
  }

  h+=`<div class="truth">
    Odpowiedzi deklarowane: <b>${p.odpowiedzi_deklarowane}</b> · z dowodem w Gmailu: <b>${p.odpowiedzi_z_dowodem_gmail}</b><br>
    Zadania „done" bez policzalnego dowodu: <b>${p.zadania_done_bez_dowodu}</b>
  </div>`;
  document.getElementById('app').innerHTML=h;
}).catch(e=>{document.getElementById('app').innerHTML='<div id="err">Błąd ładowania kasa.json: '+e+'</div>';});
</script></body></html>
