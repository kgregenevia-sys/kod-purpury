<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Centrum Dowodzenia — Kod Purpury</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon:#c77dff;--neon2:#e0398b;--ok:#39ff9e;--bg:#07040f}
body{background:radial-gradient(ellipse at top,#160a2e,#07040f 70%);color:#efe8ff;font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(160,32,240,.04) 0 1px,transparent 1px 3px);pointer-events:none;z-index:1}
.gate{text-align:center;padding:26px 16px 10px}
.sign{display:inline-block;font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(16px,4vw,30px);letter-spacing:3px;color:#fff;
 text-shadow:0 0 8px var(--neon),0 0 22px var(--neon2),0 0 40px var(--neon2);animation:flick 4s infinite}
@keyframes flick{0%,92%,100%{opacity:1}93%{opacity:.55}95%{opacity:1}96%{opacity:.4}97%{opacity:1}}
.sub{font-family:'Orbitron';font-size:11px;letter-spacing:4px;color:var(--neon);margin-top:8px;opacity:.8}
.teren{position:relative;max-width:1100px;margin:18px auto;padding:26px 16px 40px;
 border:2px solid rgba(199,125,255,.35);border-radius:14px;
 box-shadow:0 0 30px rgba(160,32,240,.25) inset,0 0 24px rgba(160,32,240,.2);
 background:linear-gradient(180deg,rgba(20,10,40,.5),rgba(7,4,15,.5))}
.teren::before{content:"";position:absolute;inset:6px;border:1px dashed rgba(199,125,255,.25);border-radius:10px;pointer-events:none}
.fence{position:absolute;top:-2px;left:0;right:0;height:14px;background:repeating-linear-gradient(90deg,transparent 0 10px,rgba(199,125,255,.5) 10px 12px);filter:drop-shadow(0 0 4px var(--neon))}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-top:14px}
.st{position:relative;background:linear-gradient(160deg,#1a0e33,#0d0620);border:1px solid rgba(199,125,255,.3);border-radius:14px;
 padding:16px 12px 14px;text-align:center;cursor:pointer;transition:.2s}
.st:hover{transform:translateY(-4px);border-color:var(--neon2);box-shadow:0 12px 34px rgba(224,57,139,.3)}
.light{position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok),0 0 16px var(--ok);animation:pulse 1.6s infinite}
@keyframes pulse{50%{opacity:.35}}
.ava{width:74px;height:88px;margin:0 auto 8px;position:relative}
.head{position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:40px;border-radius:50%;
 background:radial-gradient(circle at 40% 35%,#2a1550,#160a2e);border:2px solid var(--neon);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 12px rgba(199,125,255,.5)}
.body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:52px;height:52px;border-radius:16px 16px 10px 10px;
 background:linear-gradient(180deg,#7b2ff7,#3a1470);
 background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.14) 0 5px,transparent 5px 12px);
 border:1px solid rgba(199,125,255,.6);box-shadow:0 0 14px rgba(160,32,240,.4)}
.nm{font-family:'Orbitron';font-weight:700;font-size:14px;letter-spacing:1px;color:#fff}
.rl{font-size:12px;color:var(--neon);opacity:.85;margin-top:2px;line-height:1.2;min-height:28px}
.mini{font-size:11px;color:rgba(224,214,255,.6);margin-top:6px;font-family:'Orbitron'}
/* modal */
.ov{position:fixed;inset:0;background:rgba(4,2,10,.86);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}
.ov.on{display:flex}
.panel{position:relative;max-width:460px;width:100%}
.bubble{background:linear-gradient(160deg,#20103d,#0d0620);border:1px solid var(--neon);border-radius:16px;padding:20px;
 box-shadow:0 0 40px rgba(160,32,240,.45);position:relative}
.bubble::after{content:"";position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);border:12px solid transparent;border-top-color:var(--neon)}
.bhead{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bhead .h{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#2a1550,#160a2e);border:2px solid var(--neon);display:flex;align-items:center;justify-content:center;font-size:22px}
.bhead .t{font-family:'Orbitron';font-weight:700;color:#fff;font-size:15px}
.bhead .t small{display:block;color:var(--neon);font-weight:400;font-size:11px}
.rep{list-style:none;margin:6px 0 12px}
.rep li{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(199,125,255,.15);font-size:14px}
.rep li b{color:var(--ok);font-family:'Orbitron'}
.reply{background:rgba(160,32,240,.12);border-left:3px solid var(--neon2);border-radius:8px;padding:10px 12px;font-size:14px;margin:10px 0;min-height:20px;line-height:1.5}
.ask{display:flex;gap:8px;margin-top:8px}
.ask input{flex:1;background:#0d0620;border:1px solid rgba(199,125,255,.4);border-radius:10px;padding:11px 12px;color:#fff;font-family:'Rajdhani';font-size:15px;outline:none}
.ask input:focus{border-color:var(--neon2)}
.ask button{background:linear-gradient(135deg,#a020f0,#e0398b);border:none;border-radius:10px;color:#fff;padding:0 16px;font-family:'Orbitron';font-weight:700;cursor:pointer;font-size:13px}
.mfigure{width:70px;height:80px;margin:14px auto 0;position:relative}
.close{position:absolute;top:-14px;right:-6px;background:#1a0e33;border:1px solid var(--neon);color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;z-index:2}
.foot{text-align:center;color:rgba(224,214,255,.4);font-size:11px;margin:20px;font-family:'Orbitron';letter-spacing:2px}
.load{text-align:center;padding:40px;color:var(--neon);font-family:'Orbitron'}

#gate{position:fixed;inset:0;background:radial-gradient(ellipse at top,#160a2e,#07040f 70%);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
#gate h2{font-family:'Orbitron',sans-serif;color:#fff;font-size:22px;letter-spacing:3px;text-shadow:0 0 12px #c77dff;margin-bottom:6px}
#gate p{color:#c77dff;font-family:'Rajdhani';letter-spacing:2px;margin-bottom:22px;font-size:13px}
#gate input{background:#0d0620;border:1px solid rgba(199,125,255,.5);border-radius:12px;padding:14px 16px;color:#fff;font-family:'Rajdhani';font-size:18px;text-align:center;letter-spacing:4px;outline:none;width:min(280px,80vw)}
#gate input:focus{border-color:#e0398b}
#gate button{margin-top:14px;background:linear-gradient(135deg,#a020f0,#e0398b);border:none;border-radius:12px;color:#fff;font-family:'Orbitron';font-weight:700;padding:13px 30px;cursor:pointer;letter-spacing:2px}
#gate .err{color:#ff6b8a;font-size:13px;margin-top:12px;min-height:16px;font-family:'Rajdhani'}
body.locked{overflow:hidden}
</style></head><body class="locked">
<div id="gate">
  <h2>⚡ CENTRUM DOWODZENIA</h2>
  <p>DOSTĘP AUTORYZOWANY · KOD PURPURY / AUREU</p>
  <input id="gcode" type="password" inputmode="numeric" placeholder="• • • •" onkeydown="if(event.key==='Enter')unlock()" autofocus>
  <button onclick="unlock()">WEJDŹ</button>
  <div class="err" id="gerr"></div>
</div>


<div class="gate">
  <div class="sign">⚡ CENTRUM DOWODZENIA ⚡</div>
  <div class="sub">KOD PURPURY · AUREU · AGENCI NIGDY NIE ŚPIĄ</div>
</div>

<div class="teren">
  <div class="fence"></div>
  <div id="loglist" style="display:none;background:rgba(160,32,240,.12);border:1px solid rgba(199,125,255,.3);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#e0aaff;font-family:'Rajdhani'"></div>
  <div id="grid" class="grid"><div class="load">◍ Łączę z agentami…</div></div>
</div>

<div class="foot">SYSTEM AUTONOMICZNY · STATUS: OPERACYJNY</div>

<div class="ov" id="ov" onclick="if(event.target===this)close_()">
  <div class="panel">
    <button class="close" onclick="close_()">✕</button>
    <div class="bubble">
      <div class="bhead"><div class="h" id="bH">🤖</div><div class="t" id="bT">—<small id="bR"></small></div></div>
      <ul class="rep" id="bRep"></ul>
      <div class="reply" id="bReply">Kliknij „Zapytaj", żeby dostać meldunek…</div>
      <div class="ask">
        <input id="bIn" placeholder="Zapytaj agenta…" onkeydown="if(event.key==='Enter')ask()">
        <button onclick="ask()">WYŚLIJ</button>
      </div>
    </div>
    <div class="mfigure" style="width:70px;height:80px;margin:14px auto 0;position:relative">
      <div class="head" id="bFaceH" style="position:absolute;top:0;left:50%;transform:translateX(-50%)">🤖</div>
      <div class="body" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%)"></div>
    </div>
  </div>
</div>

<script>
const API="https://mdsvcobwuezriexyqqby.supabase.co/functions/v1/agents-status";
let AG=[], cur=null;
function face(a){return a.photo?`<img src="${a.photo.split('?')[0]}?cb=${Date.now()}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:a.emoji}
function av(a){return `<div class="ava"><div class="head">${face(a)}</div><div class="body"></div></div>`}
async function boot(){
  try{
    const r=await fetch(API); const d=await r.json(); AG=d.agents||[];
    document.getElementById('grid').innerHTML=AG.map((a,i)=>`
      <div class="st" onclick="open_(${i})">
        <div class="light"></div>
        ${av(a)}
        <div class="nm">${a.name}</div>
        <div class="rl">${a.role}</div>
        <div class="mini">${a.metrics[0].l}: ${a.metrics[0].v}</div>
      </div>`).join('');
  }catch(e){ document.getElementById('grid').innerHTML='<div class="load">⚠ Brak łączności z agentami</div>'; }
}
function open_(i){
  cur=AG[i]; const a=cur;
  document.getElementById('bH').innerHTML=face(a);
  document.getElementById('bFaceH').innerHTML=face(a);
  document.getElementById('bT').firstChild.textContent=a.name;
  document.getElementById('bR').textContent=a.role+' · '+a.cron;
  document.getElementById('bRep').innerHTML=a.metrics.map(m=>`<li><span>${m.l}</span><b>${m.v}</b></li>`).join('');
  document.getElementById('bReply').textContent='Melduję gotowość. Pytaj, szefie.';
  document.getElementById('bIn').value='';
  document.getElementById('ov').classList.add('on');
}
function close_(){document.getElementById('ov').classList.remove('on')}
async function ask(){
  if(!cur)return; const q=document.getElementById('bIn').value.trim(); if(!q)return;
  const box=document.getElementById('bReply'); box.textContent='◍ '+cur.name+' analizuje…';
  document.getElementById('bIn').value='';
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_id:cur.id,question:q})});
    const d=await r.json(); box.textContent=d.reply||'(brak odpowiedzi)';
  }catch(e){ box.textContent='⚠ Utrata łączności z agentem.'; }
}

const ACCESS="https://mdsvcobwuezriexyqqby.supabase.co/functions/v1/panel-access";
async function unlock(){
  const v=(document.getElementById('gcode').value||'').trim();
  const err=document.getElementById('gerr'); err.textContent='◍ sprawdzam…';
  try{
    const r=await fetch(ACCESS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:v})});
    const d=await r.json();
    if(d.ok){ try{localStorage.setItem('cd_auth','ok');localStorage.setItem('cd_name',d.name)}catch(e){}; enter(d.name); }
    else err.textContent='Błędny kod dostępu.';
  }catch(e){ err.textContent='Błąd połączenia.'; }
}
function enter(name){
  document.getElementById('gate').style.display='none'; document.body.classList.remove('locked');
  boot(); setInterval(boot,60000);
  const who=name||(function(){try{return localStorage.getItem('cd_name')}catch(e){return ''}})();
  if(who==='SZEF') showLog();
}
async function showLog(){
  try{
    const r=await fetch(ACCESS); const d=await r.json();
    const box=document.getElementById('loglist'); if(!box)return;
    box.innerHTML='<b>👑 Ostatnie wejścia:</b> '+(d.logins||[]).map(l=>`${l.name} (${new Date(l.created_at).toLocaleString('pl-PL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})})`).join(' · ');
    box.style.display='block';
  }catch(e){}
}
(function(){ try{ if(localStorage.getItem('cd_auth')==='ok'){ enter(localStorage.getItem('cd_name')); } }catch(e){} })();

</script>
</body></html>
