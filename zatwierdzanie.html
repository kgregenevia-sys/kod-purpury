<!doctype html><html lang=pl><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Do zatwierdzenia</title>
<style>
:root{--bg:#0b0a12;--pur:#b06cff;--gold:#c6a15b;--ink:#ece9f5;--mut:#9b93b8;--card:#171326;--line:#2a2740;--ok:#3ecf8e;--no:#e0556b}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Segoe UI',Roboto,sans-serif}
body{background:radial-gradient(900px 400px at 50% -5%,#241a3a,var(--bg));color:var(--ink);min-height:100vh;padding:20px 14px 60px}
.wrap{max-width:560px;margin:0 auto}
h1{font-size:22px;margin-bottom:4px}.sub{color:var(--mut);font-size:13px;margin-bottom:18px}
.gate{position:fixed;inset:0;background:#0b0a12;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9;padding:20px}
.gate input{background:#171326;border:1px solid var(--pur);color:#fff;font-size:24px;text-align:center;letter-spacing:.4em;padding:14px;border-radius:12px;width:200px}
.gate button,.send{background:linear-gradient(90deg,#a020f0,var(--gold));color:#150c22;font-weight:800;border:none;padding:12px 24px;border-radius:22px;font-size:15px;cursor:pointer}
.hidden{display:none}
.sec{margin:18px 0 8px;color:var(--gold);font-size:12px;letter-spacing:.15em;text-transform:uppercase}
.item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.item .h{font-weight:700;font-size:14px;margin-bottom:6px}
.item .b{color:#d7d0ee;font-size:13px;white-space:pre-wrap;line-height:1.4;max-height:120px;overflow:auto}
.row{display:flex;gap:8px;margin-top:10px}
.row button{flex:1;border:none;border-radius:10px;padding:10px;font-weight:800;font-size:14px;cursor:pointer}
.yes{background:var(--ok);color:#08331f}.rej{background:#241f3c;color:var(--no);border:1px solid var(--no)!important}
.empty{color:var(--mut);font-size:13px;padding:8px 0}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.badge{background:#1c1730;border:1px solid var(--pur);color:var(--pur);border-radius:16px;padding:5px 12px;font-weight:700;font-size:13px}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#171326;border:1px solid var(--pur);padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:.3s}
.toast.on{opacity:1}
a.back{color:var(--mut);font-size:13px;text-decoration:none}
</style></head><body>
<div class=gate id=gate>
  <div style="font-size:34px">🔐</div>
  <div style="color:#9b93b8">Podaj kod dostępu</div>
  <input id=code type=tel inputmode=numeric maxlength=6 placeholder="----">
  <button onclick="unlock()">Wejdź</button>
  <div id=gerr style="color:#e0556b;font-size:13px;height:16px"></div>
</div>
<div class=wrap id=main class=hidden>
  <a class=back href="dowodzenie.html">← Panel</a>
  <div class=top style="margin-top:8px">
    <div><h1>📋 Do zatwierdzenia</h1><div class=sub>Nic nie wychodzi bez Twojego kliknięcia</div></div>
    <span class=badge id=cnt>—</span>
  </div>
  <div id=list></div>
  <div style="margin-top:20px;text-align:center">
    <button class=send onclick="wyslij()">📤 Wyślij zatwierdzone (Resend)</button>
    <div id=sendinfo style="color:#9b93b8;font-size:12px;margin-top:8px"></div>
  </div>
</div>
<div class=toast id=toast></div>
<script>
const B="https://mdsvcobwuezriexyqqby.supabase.co/functions/v1";
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),1800);}
function auth(){try{const a=JSON.parse(localStorage.getItem('cd_auth')||'null');if(a&&a.ts&&Date.now()-a.ts<12*3600*1000)return a;}catch(e){}return null;}
async function unlock(){const c=document.getElementById('code').value.trim();const r=await fetch(B+'/panel-access',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:c})});const j=await r.json();if(j.ok){localStorage.setItem('cd_auth',JSON.stringify({name:j.name,ts:Date.now()}));document.getElementById('gate').classList.add('hidden');document.getElementById('main').classList.remove('hidden');load();}else{document.getElementById('gerr').textContent='Zły kod';}}
function esc(s){return (s||'').replace(/</g,'&lt;');}
async function act(typ,id,akcja){await fetch(B+'/approvals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({typ,id,akcja})});toast(akcja==='approve'?'✅ Zatwierdzone':'❌ Odrzucone');load();}
async function load(){
  const j=await (await fetch(B+'/approvals')).json();
  document.getElementById('cnt').textContent=(j.razem||0)+' szt.';
  let h='';
  h+='<div class=sec>📸 Posty social</div>';
  if((j.posty||[]).length){for(const p of j.posty){h+=`<div class=item><div class=h>${esc(p.platform)} · ${esc(p.theme)}</div><div class=b>${esc(p.caption)}\n\n${esc(p.hashtags)}</div><div class=row><button class=yes onclick="act('post',${p.id},'approve')">✅ Zatwierdź</button><button class=rej onclick="act('post',${p.id},'reject')">❌ Odrzuć</button></div></div>`;}}else h+='<div class=empty>Brak.</div>';
  h+='<div class=sec>🤝 Drafty co-broker</div>';
  if((j.drafty||[]).length){for(const d of j.drafty){h+=`<div class=item><div class=h>${esc(d.subject)}</div><div class=b>${esc(d.body)}</div><div class=row><button class=yes onclick="act('draft',${d.id},'approve')">✅ Zatwierdź</button><button class=rej onclick="act('draft',${d.id},'reject')">❌ Odrzuć</button></div></div>`;}}else h+='<div class=empty>Brak.</div>';
  h+='<div class=sec>🎯 Matche</div>';
  if((j.matche||[]).length){for(const m of j.matche){h+=`<div class=item><div class=h>${esc(m.buyer_name)} → ${esc(m.asset_title)}</div><div class=b>${esc(m.powod)} (ocena ${m.score})</div><div class=row><button class=yes onclick="act('match',${m.id},'approve')">✅ Zatwierdź</button><button class=rej onclick="act('match',${m.id},'reject')">❌ Odrzuć</button></div></div>`;}}else h+='<div class=empty>Brak.</div>';
  document.getElementById('list').innerHTML=h;
}
async function wyslij(){document.getElementById('sendinfo').textContent='Wysyłam...';const j=await (await fetch(B+'/send-approved',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})).json();document.getElementById('sendinfo').textContent=j.note?j.note:('Wysłane: '+(j.wyslane||0));}
if(auth()){document.getElementById('gate').classList.add('hidden');document.getElementById('main').classList.remove('hidden');load();}
document.getElementById('code').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script></body></html>
