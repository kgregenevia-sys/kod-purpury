<!doctype html><html lang=pl><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Lejki monetyzacyjne</title>
<style>
:root{--bg:#0b0a12;--pur:#b06cff;--gold:#c6a15b;--ink:#ece9f5;--mut:#9b93b8;--card:#171326;--line:#2a2740;--ok:#3ecf8e}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Segoe UI',Roboto,sans-serif}
body{background:radial-gradient(900px 400px at 50% -5%,#241a3a,var(--bg));color:var(--ink);min-height:100vh;padding:20px 14px 60px}
.wrap{max-width:600px;margin:0 auto}
a.back{color:var(--mut);font-size:13px;text-decoration:none}
h1{font-size:23px;margin:8px 0 2px}.sub{color:var(--mut);font-size:13px;margin-bottom:16px}
.gen{background:linear-gradient(90deg,#a020f0,var(--gold));color:#150c22;font-weight:800;border:none;padding:12px 22px;border-radius:22px;font-size:15px;cursor:pointer;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--pur),var(--gold))}
.card.ok::before{background:var(--ok)}
.nz{font-size:17px;font-weight:800;margin-bottom:2px;padding-right:90px}
.pot{display:inline-block;background:rgba(62,207,142,.12);color:var(--ok);border:1px solid var(--ok);border-radius:14px;padding:3px 12px;font-weight:800;font-size:14px;margin:4px 0}
.st{position:absolute;top:14px;right:14px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:12px;background:#241f3c;color:#9b93b8}
.st.p{background:rgba(62,207,142,.15);color:var(--ok)}
.nis{color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.1em;margin:6px 0}
.mod{color:#d7d0ee;font-size:13.5px;line-height:1.45;margin-bottom:10px}
.of{background:#120f20;border:1px solid var(--line);border-radius:10px;padding:10px;margin:10px 0;font-size:13px}
.of b{color:#fff}
.step{display:flex;gap:10px;padding:6px 0;border-top:1px solid #201c33;font-size:12.5px}
.step .n{color:var(--pur);font-weight:800}.step .who{color:var(--gold);font-weight:700}.step .tool{color:var(--mut)}
.act{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
.act input{width:110px;background:#0f0c1a;border:1px solid var(--pur);color:#fff;padding:9px;border-radius:8px;font-size:14px}
.act button{background:var(--ok);color:#08331f;border:none;font-weight:800;padding:10px 16px;border-radius:10px;cursor:pointer;font-size:14px}
.links a{display:inline-block;margin:8px 8px 0 0;background:#1c1730;border:1px solid var(--pur);color:#e0aaff;text-decoration:none;padding:9px 14px;border-radius:10px;font-weight:700;font-size:13px}
.why{margin-top:10px;color:var(--mut);font-size:12.5px;font-style:italic}
.empty,.load{color:var(--mut);text-align:center;padding:24px}
</style></head><body>
<div class=wrap>
<a class=back href="dowodzenie.html">← Panel</a>
<h1>💰 Lejki monetyzacyjne</h1>
<div class=sub>Potwierdź lejek → powstaje produkt w Stripe + strona sprzedażowa, gdzie ludzie płacą.</div>
<button class=gen id=gen onclick="gen()">⚡ Wygeneruj świeże lejki</button>
<div id=list><div class=load>◍ Ładuję…</div></div>
</div>
<script>
const B="https://mdsvcobwuezriexyqqby.supabase.co/functions/v1";
function esc(s){return (s||'').replace(/</g,'&lt;');}
async function load(){
  const j=await (await fetch(B+'/lejki')).json();
  const L=(j.lejki||[]).filter(x=>x && x.nazwa);
  if(!L.length){document.getElementById('list').innerHTML='<div class=empty>Brak lejków — kliknij „Wygeneruj”.</div>';return;}
  let h='';
  for(const l of L){
    const okp=l.status==='potwierdzony';
    let steps='';(l.etapy||[]).forEach((e,i)=>{steps+=`<div class=step><span class=n>${i+1}</span><div>${esc(e.krok)} <span class=who>→ ${esc(e.agent)}</span> <span class=tool>(${esc(e.narzedzie)})</span></div></div>`;});
    let bottom;
    if(okp){bottom=`<div class=links><a href="${esc(l.stripe_link)}" target=_blank>💳 Link płatności</a>${l.page_url?`<a href="${esc(l.page_url)}" target=_blank>🌐 Strona oferty</a>`:''}</div>`;}
    else{bottom=`<div class=act><input id="c${l.id}" type=number value="${l.cena||497}"> PLN <button onclick="potwierdz(${l.id})">✅ Potwierdź → Stripe</button></div>`;}
    h+=`<div class="card${okp?' ok':''}"><span class="st${okp?' p':''}">${okp?'✅ w Stripe':'nowy'}</span><div class=nz>${esc(l.nazwa)}</div><div class=pot>${esc(l.potencjal)}</div><div class=nis>${esc(l.nisza)}</div><div class=mod>${esc(l.model)}</div><div class=of>🛒 <b>${esc(l.oferta)}</b> — ${l.cena||'?'} PLN</div>${steps}${l.dlaczego?`<div class=why>💡 ${esc(l.dlaczego)}</div>`:''}${bottom}</div>`;
  }
  document.getElementById('list').innerHTML=h;
}
async function potwierdz(id){
  const cena=document.getElementById('c'+id).value;
  if(!confirm('Potwierdzić i spiąć w Stripe za '+cena+' PLN? Powstanie realny link płatności + strona.'))return;
  const btn=event.target;btn.textContent='◍ Spinam Stripe…';btn.disabled=true;
  try{const r=await fetch(B+'/lejek-stripe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,cena:Number(cena)})});const d=await r.json();if(!d.ok){alert('Błąd: '+(d.err||'?'));btn.textContent='✅ Potwierdź → Stripe';btn.disabled=false;return;}}catch(e){alert('Błąd połączenia');btn.disabled=false;return;}
  load();
}
async function gen(){const b=document.getElementById('gen');b.textContent='◍ Zespół analizuje…';b.disabled=true;try{await fetch(B+'/lejki',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});}catch(e){}b.textContent='⚡ Wygeneruj świeże lejki';b.disabled=false;load();}
load();
</script></body></html>
