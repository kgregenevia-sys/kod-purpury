<!doctype html><html lang=pl><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Biuro · Centrum Operacyjne</title>
<style>
:root{--bg:#0c0b12;--desk:#1b1830;--line:#2a2740;--ink:#ece9f5;--muted:#9b93b8;--pur:#b06cff;--gold:#c6a15b;--led:#54e08a}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:radial-gradient(1200px 500px at 50% -10%,#241a3a,var(--bg));color:var(--ink);min-height:100vh}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:radial-gradient(800px 400px at 50% 20%,#241a3a,#0c0b12)}
.gbox{text-align:center;padding:30px 26px;border:1px solid var(--line);border-radius:16px;background:#15121f;max-width:340px;width:90%}
.gbox h2{color:var(--gold);letter-spacing:.06em;font-size:19px;margin:0 0 4px}
.gbox p{color:var(--muted);font-size:12px;letter-spacing:.2em;margin:0 0 18px}
.gbox input{width:100%;text-align:center;letter-spacing:.4em;font-size:22px;background:#0f0d1c;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;margin-bottom:12px}
.gbox button{width:100%;background:linear-gradient(90deg,#a020f0,#c6a15b);color:#150c22;border:none;border-radius:10px;padding:12px;font-weight:800;font-size:15px;cursor:pointer;letter-spacing:.08em}
.err{color:#ff6b8a;font-size:12px;margin-top:10px;min-height:16px}
.back{position:fixed;top:12px;left:14px;color:var(--gold);text-decoration:none;font-size:13px;font-weight:700;z-index:60}
.top{padding:22px 20px 6px;text-align:center}
.sign{display:inline-block;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:#0c0b12;background:linear-gradient(90deg,var(--gold),#e6c988);padding:6px 18px;border-radius:4px;font-weight:800}
.top h1{font-size:20px;margin:12px 0 2px;font-weight:700}
.top p{color:var(--muted);font-size:13px;margin:0}
.floor{max-width:1080px;margin:20px auto 60px;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.desk{position:relative;background:linear-gradient(180deg,var(--desk),#161327);border:1px solid var(--line);border-radius:14px;padding:16px 14px 14px;cursor:pointer;transition:.18s;overflow:hidden}
.desk:hover{border-color:var(--pur);transform:translateY(-3px);box-shadow:0 10px 30px rgba(176,108,255,.18)}
.desk::before{content:'';position:absolute;left:0;right:0;top:0;height:6px;background:linear-gradient(90deg,var(--pur),var(--gold))}
.led{position:absolute;top:14px;right:14px;width:9px;height:9px;border-radius:50%;background:var(--led);box-shadow:0 0 10px var(--led)}
.who{display:flex;align-items:center;gap:12px}
.av{width:52px;height:52px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:26px;background:#241f3c;border:2px solid var(--pur);overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.nm{font-weight:800;letter-spacing:.04em;font-size:16px}
.rl{color:var(--muted);font-size:11.5px;margin-top:2px;line-height:1.35}
.bubble{margin-top:12px;background:#0f0d1c;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:12px;color:#d7d0ee;line-height:1.45;position:relative}
.bubble::before{content:'';position:absolute;top:-6px;left:22px;width:10px;height:10px;background:#0f0d1c;border-left:1px solid var(--line);border-top:1px solid var(--line);transform:rotate(45deg)}
.cta{margin-top:9px;font-size:11px;color:var(--gold);font-weight:700}
.ov{position:fixed;inset:0;background:rgba(6,5,12,.72);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:18px;z-index:40}
.ov.on{display:flex}
.card{background:linear-gradient(180deg,#1b1830,#141126);border:1px solid var(--line);border-radius:16px;max-width:460px;width:100%;padding:22px;max-height:88vh;overflow-y:auto}
.card .who{margin-bottom:6px}
.spk{background:transparent;border:1px solid var(--pur);color:var(--pur);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;margin:6px 0 4px}
.spk.playing{background:var(--pur);color:#150c22}
.h{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:16px 0 6px}
.say{background:#0f0d1c;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.5;color:#e3ddf5}
.mtx{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.mt{background:#0f0d1c;border:1px solid var(--line);border-radius:10px;padding:10px}
.mt .v{font-size:20px;font-weight:800;color:var(--gold)}
.mt .l{font-size:11px;color:var(--muted);margin-top:2px}
.ask{display:flex;gap:8px;margin-top:14px}
.ask input{flex:1;background:#0f0d1c;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px;font-size:13px}
.ask button,.close{background:var(--pur);color:#150c22;border:none;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer;font-family:inherit}
.close{background:transparent;color:var(--muted);border:1px solid var(--line);width:100%;margin-top:14px}
.reply{margin-top:12px;background:#120f22;border:1px solid var(--pur);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.5;display:none}
.reply.on{display:block}
@media(max-width:520px){.mtx{grid-template-columns:1fr}}
</style></head><body>
<div id="gate"><div class="gbox"><h2>BIURO · KOD PURPURY</h2><p>DOSTEP AUTORYZOWANY</p><input id="gcode" type="password" inputmode="numeric" placeholder="* * * *" onkeydown="if(event.key==='Enter')unlock()" autofocus><button onclick="unlock()">WEJDZ</button><div class="err" id="gerr"></div></div></div>
<div id="office" style="display:none">
<a class="back" href="dowodzenie.html">< Panel</a>
<div class=top><span class=sign>Biuro · Centrum Operacyjne</span><h1>Ekipa na stanowiskach</h1><p>Kliknij agenta - zamelduje swoim glosem, czym sie zajmuje i jakie ma efekty.</p></div>
<div class=floor id=floor></div>
</div>
<div class=ov id=ov><div class=card id=card></div></div>
<script>
var EP='https://mdsvcobwuezriexyqqby.supabase.co/functions/v1/agents-status';
var TTS='https://mdsvcobwuezriexyqqby.supabase.co/functions/v1/biuro-tts';
var ACCESS='https://mdsvcobwuezriexyqqby.supabase.co/functions/v1/panel-access';
var AG=[],AUDIO=null,SEQ=0,CUR=null,WHO='';
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function nice(n){n=(n||'').toString().toLowerCase();return n?n.charAt(0).toUpperCase()+n.slice(1):'szefie';}
function hello(a){var W=nice(WHO);var m={cobroker:'Siema '+W+'! Seba z tej strony. Domykam współpracę z agencjami - Ty patrz na kafelek, ja robię robotę.',kliniki:'Siema '+W+'! Taras melduje. Orzę bazę klinik i pukam do gorących leadów - bez spiny, wszystko pod kontrolą.',lejek:'Hej '+W+'! Oksana tu. Prowadzę ludzi przez wyzwanie prosto do Premium - lejek grzeje się ładnie.',social:'Siema '+W+'! Bohdan na łączach. Wrzucam content non stop - feed nigdy nie stoi.',whatsapp:'Ej '+W+'! Dmytro, gadam z leadami na WhatsAppie o każdej porze - śpię? nie znam.',mykolaj:'Siema '+W+'! Mykola kojarzy kupujących z ofertami - jak swat, tylko skuteczniejszy.',analityk:'Witaj '+W+'. Volodymyr. Liczby, ROI, raporty - mówię krótko, bo dane mówią za mnie.',watchdog:'Siema '+W+'. Ostap na warcie. Pilnuję żeby nic nie padło - cisza znaczy porządek.',yaroslav:'Siema '+W+'! Jarosław. Pakuję aktywa w sześć języków i rozsyłam po dwustu kanałach - luksus sam się nie sprzeda.',ruslan:'Siema '+W+'! Rusłan. Łączę nas z brokerami na całą Europę - prowizja czeka.',kierownik:'Ekipa, tu Kierownik. Zaraz odprawa: kto dowozi, kto stoi, co poprawiamy - i rozdaję zadania.',strateg:'Tu Strateg. Skanuję rynek 24/7 i podrzucam Kierownikowi świeże okazje pod nasz zestaw.'};return m[a.id]||('Siema '+W+'! Tu '+a.name+'.');}
function avatar(a){return a.photo? '<div class=av><img src="'+a.photo+'"></div>' : '<div class=av>'+(a.emoji||'@')+'</div>';}
function greet(a){return esc(hello(a))+' Klik po szczegóły.';}
function unlock(){var v=(document.getElementById('gcode').value||'').trim();var e=document.getElementById('gerr');e.textContent='sprawdzam...';fetch(ACCESS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:v})}).then(function(r){return r.json();}).then(function(d){if(d&&d.ok){try{localStorage.setItem('biuro_auth','ok');localStorage.setItem('biuro_name',(d.name||''));localStorage.setItem('biuro_ts',Date.now())}catch(x){}enter();}else e.textContent='Bledny kod dostepu.';}).catch(function(){e.textContent='Blad polaczenia.';});}
function enter(){try{WHO=localStorage.getItem('biuro_name')||''}catch(e){}document.getElementById('gate').style.display='none';drawFeed();setInterval(drawFeed,60000);document.getElementById('office').style.display='block';load();}
function stopAudio(){try{if(AUDIO){AUDIO.pause();AUDIO.src='';AUDIO=null;}}catch(e){}if(window.speechSynthesis)window.speechSynthesis.cancel();}
function speak(t,btn,a){var my=++SEQ;stopAudio();if(btn)btn.classList.add('playing');fetch(TTS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_id:a.id,text:t})}).then(function(r){if(my!==SEQ)throw 0;var ct=r.headers.get('content-type')||'';if(!r.ok||ct.indexOf('audio')<0)throw 0;return r.blob();}).then(function(b){if(my!==SEQ)return;var url=URL.createObjectURL(b);AUDIO=new Audio(url);try{AUDIO.playbackRate=1.4;AUDIO.preservesPitch=true;AUDIO.mozPreservesPitch=true;AUDIO.webkitPreservesPitch=true;}catch(e){}AUDIO.onended=function(){if(btn)btn.classList.remove('playing');URL.revokeObjectURL(url);};AUDIO.play();}).catch(function(){if(btn)btn.classList.remove('playing');});}
function render(){var f=document.getElementById('floor');f.innerHTML='';AG.forEach(function(a,i){var d=document.createElement('div');d.className='desk';d.onclick=function(){open(i);};d.innerHTML='<div class=led></div><div class=who>'+avatar(a)+'<div><div class=nm>'+esc(a.name)+'</div><div class=rl>'+esc(a.role)+'</div></div></div><div class=bubble>'+greet(a)+'</div><div class=cta>&gt; Tak, meldujcie</div>';f.appendChild(d);});}
function open(i){var a=AG[i];CUR=i;var mtx=(a.metrics||[]).map(function(m){return '<div class=mt><div class=v>'+esc(String(m.v))+'</div><div class=l>'+esc(m.l)+'</div></div>';}).join('');var c=document.getElementById('card');c.innerHTML='<div class=who>'+avatar(a)+'<div><div class=nm>'+esc(a.name)+'</div><div class=rl>'+esc(a.role)+'</div></div></div><button class=spk id=spk>Posluchaj meldunku</button><div class=say id=meld>'+esc(hello(a))+' <span style="opacity:.5">... melduje</span></div><div class=h>Czym sie zajmuje</div><div class=say>'+esc(a.role)+', harmonogram: '+esc(a.cron||'-')+'</div><div class=h>Efekty mojej pracy</div><div class=mtx>'+(mtx||'<div class=mt><div class=v>-</div><div class=l>brak danych</div></div>')+'</div><div class=ask><input id=q placeholder="Zapytaj '+esc(a.name)+'..."><button id=askb>Zapytaj</button></div><div class=reply id=reply></div><button class=close id=closeb>Zamknij</button>';document.getElementById('ov').classList.add('on');window._say=hello(a);document.getElementById('spk').onclick=function(){if(window._say)speak(window._say,this,AG[CUR]);};document.getElementById('askb').onclick=function(){ask(a.id);};document.getElementById('closeb').onclick=stopAll;meldunek(a);}function meldunek(a){var my=++SEQ;var box=document.getElementById('meld');fetch(EP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_id:a.id,who:nice(WHO),question:''})}).then(function(x){return x.json();}).then(function(j){if(my!==SEQ)return;var t=(j&&j.reply)?j.reply:hello(a);window._say=t;if(box)box.textContent=t;speak(t,document.getElementById('spk'),a);}).catch(function(){if(my!==SEQ)return;var t=hello(a);window._say=t;if(box)box.textContent=t;speak(t,document.getElementById('spk'),a);});}
function ask(id){var q=document.getElementById('q').value.trim();if(!q)return;var r=document.getElementById('reply');r.className='reply on';r.textContent='...';fetch(EP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_id:id,question:q,who:nice(WHO)})}).then(function(x){return x.json();}).then(function(j){var t=j.reply||j.err||'Brak odpowiedzi.';r.textContent=t;speak(t,null,AG[CUR]);}).catch(function(){r.textContent='Blad polaczenia.';});}
function stopAll(){stopAudio();document.getElementById('ov').classList.remove('on');}
document.getElementById('ov').addEventListener('click',function(e){if(e.target.id==='ov')stopAll();});
window._feedOpen=true;function toggleFeed(){window._feedOpen=!window._feedOpen;var l=document.getElementById("feedList");if(l)l.style.display=window._feedOpen?"block":"none";}function drawFeed(){fetch("https://mdsvcobwuezriexyqqby.supabase.co/functions/v1/panel-data").then(function(r){return r.json();}).then(function(d){var f=d.feed||[];var box=document.getElementById("feedBox");if(!box){box=document.createElement("div");box.id="feedBox";box.style.cssText="position:fixed;left:0;right:0;bottom:0;background:rgba(11,10,18,.97);border-top:1px solid #b06cff;z-index:6";document.body.appendChild(box);}var items=f.map(function(x){return "<div style=\"padding:5px 12px;border-bottom:1px solid #201c33;font-size:12px\"><b style=\"color:#e0aaff\">"+x.kto+"</b> <span style=\"color:#9b93b8\">"+x.typ+"</span> \u2014 "+(x.tekst||"").replace(/</g,"&lt;")+" <span style=\"color:#6b6488\">"+x.kiedy+"</span></div>";}).join("");var disp=window._feedOpen?"block":"none";box.innerHTML="<div onclick=\"toggleFeed()\" style=\"cursor:pointer;padding:8px 12px;color:#c6a15b;letter-spacing:.12em;text-transform:uppercase;font-size:10px;background:#150f24\">\ud83d\udce1 Na \u017cywo \u2014 kto co robi \u25be</div><div id=\"feedList\" style=\"max-height:30vh;overflow:auto;display:"+disp+"\">"+items+"</div>";}).catch(function(){});}
function load(){fetch(EP).then(function(x){return x.json();}).then(function(j){AG=j.agents||[];render();}).catch(function(){document.getElementById('floor').innerHTML='<p style=color:#9b93b8>Nie udalo sie pobrac ekipy.</p>';});}
try{enter();}catch(e){}
</script></body></html>
